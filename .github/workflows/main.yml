name: Aliyun Auto Checkin

on:
  schedule:
    # 每天北京时间早上 8:10 运行 (UTC 时间 0:10)
    - cron: '10 0 * * *'
  workflow_dispatch: # 允许你手动点击按钮运行

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Checkin Script
        env:
          # 如果你的脚本需要环境变量（比如 Token），在这里引用
          ALIYUN_TOKEN: ${{ secrets.ALIYUN_TOKEN }}
        run: python ali_check.py # 假设你的启动文件是 main.py
